{% extends 'base.html' %}

{% block title %}File Complaint - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>File Hostel Complaint</h1>
    </div>

    <div class="form-container">
        <form method="POST" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Mess">Mess / Food</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Plumbing">Plumbing</option>
                    <option value="Cleaning">Cleaning / Hygiene</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Internet">Internet / Wi-Fi</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="hostel_block">Hostel Block</label>
                    <input type="text" id="hostel_block" name="hostel_block" required>
                </div>
                <div class="form-group">
                    <label for="room_number">Room Number</label>
                    <input type="text" id="room_number" name="room_number" required>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit Complaint</button>
                <a href="{% url 'hostel_complaints' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
