{% extends 'base.html' %}

{% block title %}Edit Profile - UniEase{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Edit Your Profile</h2>
        <p>Update your profile information below.</p>
        <form method="POST" class="auth-form" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Role</label>
                <input type="text" value="{{ profile.get_role_display }}" disabled class="form-control">
                <small class="text-muted">Role cannot be changed. Please contact admin if incorrect.</small>
            </div>

            <div class="form-group">
                <label for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" value="{{ profile.roll_number }}"
                    placeholder="Enter roll number">
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" value="{{ profile.department }}"
                    placeholder="Enter department">
            </div>

            <div class="form-group">
                <label for="year">Year</label>
                <select id="year" name="year">
                    <option value="" {% if not profile.year %}selected{% endif %}>Select Year</option>
                    <option value="1" {% if profile.year == 1 %}selected{% endif %}>1st Year</option>
                    <option value="2" {% if profile.year == 2 %}selected{% endif %}>2nd Year</option>
                    <option value="3" {% if profile.year == 3 %}selected{% endif %}>3rd Year</option>
                    <option value="4" {% if profile.year == 4 %}selected{% endif %}>4th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ profile.phone }}" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label for="hostel_room">Hostel Room</label>
                <input type="text" id="hostel_room" name="hostel_room" value="{{ profile.hostel_room }}"
                    placeholder="Enter room number">
            </div>


            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary btn-block">Update Profile</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-block mt-2"
                    style="text-align: center; display: block;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
