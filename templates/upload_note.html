{% extends 'base.html' %}

{% block title %}Upload Note - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Upload Note</h1>
    </div>

    <div class="form-container">
        <form method="POST" enctype="multipart/form-data" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="semester">Semester</label>
                <select id="semester" name="semester" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="form-group">
                <label for="file">File (PDF/DOCX)</label>
                <input type="file" id="file" name="file" accept=".pdf,.doc,.docx" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Upload Note</button>
                <a href="{% url 'notes' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
