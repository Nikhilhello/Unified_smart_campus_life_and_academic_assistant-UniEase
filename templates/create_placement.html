{% extends 'base.html' %}

{% block title %}Create Placement - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Post Placement Opportunity</h1>
    </div>

    <div class="form-container">
        <form method="POST" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="company_name">Company Name</label>
                <input type="text" id="company_name" name="company_name" required>
            </div>
            <div class="form-group">
                <label for="job_title">Job Title</label>
                <input type="text" id="job_title" name="job_title" required>
            </div>
            <div class="form-group">
                <label for="job_type">Job Type</label>
                <select id="job_type" name="job_type" required>
                    <option value="internship">Internship</option>
                    <option value="fulltime">Full Time</option>
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="eligibility">Eligibility</label>
                <textarea id="eligibility" name="eligibility" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="required_skills">Required Skills</label>
                <textarea id="required_skills" name="required_skills" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="package">Package</label>
                <input type="text" id="package" name="package" placeholder="e.g., 5-7 LPA" required>
            </div>
            <div class="form-group">
                <label for="application_deadline">Application Deadline</label>
                <input type="date" id="application_deadline" name="application_deadline" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Post Opportunity</button>
                <a href="{% url 'placements' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
