{% extends 'base.html' %}

{% block title %}Ask Doubt - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Ask a Doubt</h1>
    </div>

    <div class="form-container">
        <form method="POST" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="topic">Topic</label>
                <input type="text" id="topic" name="topic" required>
            </div>
            <div class="form-group">
                <label for="question">Question</label>
                <textarea id="question" name="question" rows="6" required></textarea>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_anonymous">
                    Post anonymously
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Post Doubt</button>
                <a href="{% url 'doubts' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
