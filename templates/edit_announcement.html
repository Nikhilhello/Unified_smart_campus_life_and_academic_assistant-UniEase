{% extends 'base.html' %}

{% block title %}Edit Announcement - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Edit Announcement</h1>
    </div>

    <div class="form-container">
        <form method="POST" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ announcement.title }}" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="6" required>{{ announcement.content }}</textarea>
            </div>
            <div class="form-group">
                <label for="target_audience">Target Audience</label>
                <select id="target_audience" name="target_audience" required>
                    <option value="all" {% if announcement.target_audience == 'all' %}selected{% endif %}>All</option>
                    <option value="student" {% if announcement.target_audience == 'student' %}selected{% endif %}>Students
                    </option>
                    <option value="faculty" {% if announcement.target_audience == 'faculty' %}selected{% endif %}>Faculty
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                    <option value="low" {% if announcement.priority == 'low' %}selected{% endif %}>Low</option>
                    <option value="medium" {% if announcement.priority == 'medium' %}selected{% endif %}>Medium</option>
                    <option value="high" {% if announcement.priority == 'high' %}selected{% endif %}>High</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Announcement</button>
                <a href="{% url 'announcements' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
