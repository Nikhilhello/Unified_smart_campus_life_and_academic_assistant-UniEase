{% extends 'base.html' %}

{% block title %}Add Academic Record - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Add Academic Record</h1>
    </div>

    <div class="form-container">
        <form method="POST" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="semester">Semester</label>
                <select id="semester" name="semester" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="marks_obtained">Marks Obtained</label>
                    <input type="number" id="marks_obtained" name="marks_obtained" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="total_marks">Total Marks</label>
                    <input type="number" id="total_marks" name="total_marks" step="0.01" required>
                </div>
            </div>
            <div class="form-group">
                <label for="grade">Grade</label>
                <input type="text" id="grade" name="grade" placeholder="e.g., A+, A, B+" required>
            </div>
            <div class="form-group">
                <label for="attendance_percentage">Attendance Percentage</label>
                <input type="number" id="attendance_percentage" name="attendance_percentage" step="0.01" min="0" max="100" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Record</button>
                <a href="{% url 'academic_vault' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
