{% extends 'base.html' %}

{% block title %}Create Profile - UniEase{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Complete Your Profile</h2>
        <p>Please fill in your profile details to continue.</p>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" placeholder="Enter roll number">
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" placeholder="Enter department">
            </div>
            <div class="form-group">
                <label for="year">Year</label>
                <select id="year" name="year">
                    <option value="">Select Year</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Profile</button>
        </form>
    </div>
</div>
{% endblock %}
