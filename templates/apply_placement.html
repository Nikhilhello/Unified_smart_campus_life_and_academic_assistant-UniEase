{% extends 'base.html' %}

{% block title %}Apply - UniEase{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Apply for {{ placement.job_title }}</h1>
    </div>

    <div class="form-container">
        <form method="POST" enctype="multipart/form-data" class="standard-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="resume">Resume (PDF)</label>
                <input type="file" id="resume" name="resume" accept=".pdf" required>
            </div>
            <div class="form-group">
                <label for="cover_letter">Cover Letter</label>
                <textarea id="cover_letter" name="cover_letter" rows="8" required></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit Application</button>
                <a href="{% url 'placement_detail' placement.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
